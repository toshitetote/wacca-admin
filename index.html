<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaCCA 食堂登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #FFF8F5;
      min-height: 100vh;
      padding: 40px 16px 60px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 { font-size: 28px; color: #FF6B35; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #888; }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #FF6B35;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: 2px solid #FFE0D0;
    }

    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    label .required { color: #FF6B35; margin-left: 4px; }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      background: #FAFAFA;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #FF6B35;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .notice {
      background: #FFF3E0;
      border-left: 4px solid #FF6B35;
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .message {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
      line-height: 1.8;
    }
    .message.success { background: #E8F5E9; color: #2E7D32; display: block; }
    .message.error   { background: #FFEBEE; color: #C62828; display: block; }
  </style>
</head>
<body>

<div class="header">
  <h1>🍚 WaCCA</h1>
  <p>こども食堂向け予約システム　運営者登録</p>
</div>

<div class="card">
  <div class="section-title">🏪 食堂情報の登録</div>

  <div class="notice">
    登録完了後、<strong>2ヶ月間は無料</strong>でご利用いただけます。<br>
    無料期間終了後は月額<strong>3,300円（税込）</strong>が発生します。<br>
    登録完了後にセットアップ手順をメールでお送りします。
  </div>

  <form id="shopForm" onsubmit="submitShop(event)">
    <div class="form-group">
      <label>食堂名 <span class="required">*</span></label>
      <input type="text" id="shopName" placeholder="例：○○こども食堂" required maxlength="100">
    </div>
    <div class="form-group">
      <label>運営者名 <span class="required">*</span></label>
      <input type="text" id="ownerName" placeholder="例：田中 太郎" required maxlength="50">
    </div>
    <div class="form-group">
      <label>メールアドレス <span class="required">*</span></label>
      <input type="email" id="email" placeholder="例：info@example.com" required maxlength="100">
    </div>
    <div class="form-group">
      <label>電話番号 <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="例：090-0000-0000" required maxlength="20">
    </div>
    <div class="form-group">
      <label>住所 <span class="required">*</span></label>
      <input type="text" id="address" placeholder="例：東京都○○区○○町1-2-3" required maxlength="200">
    </div>

        <button type="submit" class="btn" id="submitBtn">登録する</button>
  </form>
  <div id="resultMessage" class="message"></div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbym2Gzed66_kHtluEeWp0IQtoB0WnjBKVz1wMEIVB88BBp09iji91KHft8sCUVbQU-IKw/exec';

  async function submitShop(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const params = new URLSearchParams({
      action: 'registerShop',
      shopName: document.getElementById('shopName').value.trim(),
      ownerName: document.getElementById('ownerName').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      address: document.getElementById('address').value.trim()
    });

    try {
      const res = await fetch(`${GAS_URL}?${params}`);
      const result = await res.json();
      const msg = document.getElementById('resultMessage');

            if (result.success) {
        document.getElementById('shopForm').style.display = 'none';
        msg.style.display = 'block';
        msg.className = 'message success';
        msg.innerHTML = `✅ 登録が完了しました！<br>食堂ID：${result.shopId}<br><br>セットアップ手順をメールでお送りしました。ご確認ください。`;
      } else {
        msg.className = 'message error';
        msg.textContent = '⚠️ ' + result.message;
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登録する';
      }
    } catch (err) {
      const msg = document.getElementById('resultMessage');
      msg.className = 'message error';
      msg.textContent = '⚠️ ' + err.toString();
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登録する';
    }
  }
</script>
</body>
</html>
