<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaCCA 管理者ページ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #FFF4EF; color: #333; min-height: 100vh; }

    .header {
      background: #E07048;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 18px; }
    .header small { font-size: 12px; opacity: 0.8; }

    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 56px);
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-box h2 { font-size: 18px; color: #E07048; margin-bottom: 24px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .login-box button {
      width: 100%;
      background: #E07048;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-error { color: #e53935; font-size: 13px; margin-top: 8px; }

    .main { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 10px 20px;
      border-radius: 8px;
      border: 2px solid #E07048;
      background: #fff;
      color: #E07048;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    .tab.active { background: #E07048; color: #fff; }

    .section { display: none; }
    .section.active { display: block; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h3 { font-size: 15px; color: #E07048; margin-bottom: 14px; border-bottom: 1px solid #F5CBBA; padding-bottom: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #F5CBBA; padding: 10px 8px; text-align: left; font-weight: bold; color: #555; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0e8e4; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FFF8F5; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-active { background: #e8f5e9; color: #2e7d32; }
    .badge-free { background: #e3f2fd; color: #1565c0; }
    .badge-stop { background: #fce4ec; color: #c62828; }
    .badge-paid { background: #e8f5e9; color: #2e7d32; }
    .badge-unpaid { background: #fff3e0; color: #e65100; }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary { background: #E07048; color: #fff; }
    .btn-stop { background: #e53935; color: #fff; }
    .btn-restart { background: #43a047; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .paid-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .paid-form input[type="date"] {
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn.active { background: #E07048; color: #fff; border-color: #E07048; }

    .summary { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 140px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .summary-card .num { font-size: 28px; font-weight: bold; color: #E07048; }
    .summary-card .label { font-size: 12px; color: #888; margin-top: 4px; }

    .msg { padding: 10px; background: #e8f5e9; border-radius: 6px; font-size: 13px; color: #2e7d32; margin-top: 8px; display: none; }
    .loading { text-align: center; padding: 40px; color: #aaa; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍚 WaCCA 管理者ページ</h1>
    <small>合同会社TETOTE 専用</small>
  </div>
</div>

<!-- ログイン -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h2>🔑 管理者ログイン</h2>
    <input type="password" id="adminPass" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- メイン -->
<div class="main" id="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('billing')">💰 請求管理</button>
    <button class="tab" onclick="switchTab('shops')">🏪 食堂一覧</button>
  </div>

  <!-- 請求管理 -->
  <div class="section active" id="sec-billing">
    <div id="billingLoading" class="loading">読み込み中...</div>
    <div id="billingContent" style="display:none">
      <div class="summary" id="billingSummary"></div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterBilling('all', this)">すべて</button>
        <button class="filter-btn" onclick="filterBilling('未払い', this)">未払いのみ</button>
        <button class="filter-btn" onclick="filterBilling('支払済み', this)">支払済みのみ</button>
      </div>
      <div class="card">
        <h3>請求一覧</h3>
        <div style="overflow-x:auto">
          <table id="billingTable">
            <thead>
              <tr>
                <th>食堂名</th>
                <th>請求月</th>
                <th>金額</th>
                <th>状態</th>
                <th>支払日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="billingBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 食堂一覧 -->
  <div class="section" id="sec-shops">
    <div id="shopsLoading" class="loading">読み込み中...</div>
    <div id="shopsContent" style="display:none">
      <div class="summary" id="shopsSummary"></div>
      <div class="card">
        <h3>食堂一覧</h3>
        <div style="overflow-x:auto">
          <table id="shopsTable">
            <thead>
              <tr>
                <th>食堂ID</th>
                <th>食堂名</th>
                <th>運営者</th>
                <th>メール</th>
                <th>無料終了日</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="shopsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtQ2LWE8vJqbHUZq8tmN13fkXNytvgfdioUzN4NqkpRQkv11sIiajQvv4KfDAp6J4iZA/exec';

let allBilling = [];
let allShops = [];

async function gas(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function adminLogin() {
  const pass = document.getElementById('adminPass').value;
  const result = await gas({ action: 'adminLogin', password: pass });
  if (result.success) {
    sessionStorage.setItem('adminPass', pass);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadBilling();
    loadShops();
  } else {
    document.getElementById('loginError').textContent = 'パスワードが正しくありません。';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');
}

// 請求管理
async function loadBilling() {
  allBilling = await gas({ action: 'adminGetBilling' });
  renderBilling(allBilling);
  document.getElementById('billingLoading').style.display = 'none';
  document.getElementById('billingContent').style.display = 'block';

  const unpaid = allBilling.filter(b => b.status === '未払い').length;
  const paid   = allBilling.filter(b => b.status === '支払済み').length;
  const total  = allBilling.filter(b => b.status === '未払い').reduce((s, b) => s + Number(b.amount), 0);
  document.getElementById('billingSummary').innerHTML = `
    <div class="summary-card"><div class="num">${unpaid}</div><div class="label">未払い件数</div></div>
    <div class="summary-card"><div class="num">¥${total.toLocaleString()}</div><div class="label">未収合計</div></div>
    <div class="summary-card"><div class="num">${paid}</div><div class="label">支払済み件数</div></div>
  `;
}

function renderBilling(data) {
  const tbody = document.getElementById('billingBody');
  tbody.innerHTML = data.map(b => `
    <tr>
      <td>${b.shopName}</td>
      <td>${b.billingMonth}</td>
      <td>¥${Number(b.amount).toLocaleString()}</td>
      <td><span class="badge ${b.status === '支払済み' ? 'badge-paid' : 'badge-unpaid'}">${b.status}</span></td>
      <td>${b.paidDate || '—'}</td>
      <td>
        ${b.status === '未払い' ? `
          <div class="paid-form">
            <input type="date" id="date-${b.shopId}-${b.billingMonth}" value="${todayStr()}">
            <button class="btn btn-primary btn-sm" onclick="markPaid('${b.shopId}','${b.billingMonth}','date-${b.shopId}-${b.billingMonth}', this)">支払済みにする</button>
          </div>
        ` : ''}
      </td>
    </tr>
  `).join('');
}

function filterBilling(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allBilling : allBilling.filter(b => b.status === status);
  renderBilling(filtered);
}

async function markPaid(shopId, billingMonth, dateId, btn) {
  const paidDate = document.getElementById(dateId).value;
  if (!paidDate) { alert('支払日を入力してください。'); return; }
  btn.disabled = true;
  btn.textContent = '更新中...';
  const result = await gas({ action: 'adminMarkPaid', shopId, billingMonth, paidDate });
  if (result.success) {
    await loadBilling();
  } else {
    alert('更新に失敗しました。');
    btn.disabled = false;
    btn.textContent = '支払済みにする';
  }
}

// 食堂一覧
async function loadShops() {
  allShops = await gas({ action: 'adminGetShops' });
  renderShops(allShops);
  document.getElementById('shopsLoading').style.display = 'none';
  document.getElementById('shopsContent').style.display = 'block';

  const active = allShops.filter(s => s.status === '有効').length;
  const free   = allShops.filter(s => s.status === '無料期間中').length;
  const stop   = allShops.filter(s => s.status === '停止').length;
  document.getElementById('shopsSummary').innerHTML = `
    <div class="summary-card"><div class="num">${allShops.length}</div><div class="label">総食堂数</div></div>
    <div class="summary-card"><div class="num">${free}</div><div class="label">無料期間中</div></div>
    <div class="summary-card"><div class="num">${active}</div><div class="label">有効（課金中）</div></div>
    <div class="summary-card"><div class="num">${stop}</div><div class="label">停止中</div></div>
  `;
}

function renderShops(data) {
  const tbody = document.getElementById('shopsBody');
  tbody.innerHTML = data.map(s => {
    const badgeClass = s.status === '有効' ? 'badge-active' : s.status === '無料期間中' ? 'badge-free' : 'badge-stop';
    const btnHtml = s.status === '停止'
      ? `<button class="btn btn-restart btn-sm" onclick="toggleStatus('${s.shopId}','有効',this)">再開</button>`
      : `<button class="btn btn-stop btn-sm" onclick="toggleStatus('${s.shopId}','停止',this)">停止</button>`;
    const lineEmailLabel = s.lineSetupEmailSentAt ? '再送信' : 'LINE設定完了メール';
    const lineEmailNote  = s.lineSetupEmailSentAt
      ? `<div style="font-size:11px; color:#888; margin-top:2px;">送信済み：${s.lineSetupEmailSentAt}</div>`
      : '';
    return `
      <tr>
        <td>${s.shopId}</td>
        <td>${s.shopName}</td>
        <td>${s.ownerName}</td>
        <td><a href="mailto:${s.email}" style="color:#E07048">${s.email}</a></td>
        <td>${s.freeEnd}</td>
        <td><span class="badge ${badgeClass}">${s.status}</span></td>
        <td>
          ${btnHtml}
          <button class="btn btn-sm" style="background:#E07048; color:#fff;" onclick="sendLineSetupEmail('${s.shopId}','${s.shopName}',this)">${lineEmailLabel}</button>
          ${lineEmailNote}
        </td>
      </tr>
    `;
  }).join('');
}

async function sendLineSetupEmail(shopId, shopName, btn) {
  if (!confirm(`${shopName} 様へ「LINE公式アカウントの設定が完了しました」メールを送信しますか？`)) return;
  btn.disabled = true;
  const result = await gas({ action: 'sendLineSetupCompleteEmail', shopId });
  if (result.success) {
    alert('送信しました。');
  } else {
    alert(result.message || '送信に失敗しました。');
  }
  btn.disabled = false;
}

async function toggleStatus(shopId, status, btn) {
  if (!confirm(`この食堂を「${status}」にしますか？`)) return;
  btn.disabled = true;
  const result = await gas({ action: 'adminToggleShopStatus', shopId, status });
  if (result.success) {
    await loadShops();
  } else {
    alert('更新に失敗しました。');
    btn.disabled = false;
  }
}

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
</script>
</body>
</html>
